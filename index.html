<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Financas do Casal</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
window.onerror = function(msg, src, line, col, err) {
  document.body.innerHTML =
    '<pre style="color:red;padding:20px">' +
    msg + '\nLinha: ' + line +
    '\nArquivo: ' + src +
    '</pre>';
};
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --fd:'Lora',Georgia,serif;--fb:'Plus Jakarta Sans',system-ui,sans-serif;
  --bg:#f5f4f0;--surface:#fff;--surface2:#faf9f7;
  --border:#e8e5df;--border2:#d4d0c8;
  --text:#1c1a17;--muted:#7a7669;--muted2:#b5b0a4;
  --gi:#c2185b;--gi-light:#fce4ec;--gi-mid:#f48fb1;
  --br:#1565c0;--br-light:#e3f2fd;--br-mid:#90caf9;
  --ca:#5e35b1;--ca-light:#ede7f6;--ca-mid:#b39ddb;
  --green:#2e7d32;--green-bg:#f1f8e9;--green-bd:#a5d6a7;
  --red:#c62828;--red-bg:#ffebee;--red-bd:#ef9a9a;
  --amber:#e65100;--amber-bg:#fff3e0;
  --r:10px;--r2:16px;--r3:22px;
  --sh2:0 4px 24px rgba(0,0,0,.09);--t:.18s ease;
}
html{font-size:15px;background:var(--bg)}
body{font-family:var(--fb);color:var(--text);min-height:100vh}

/* LOGIN */
#login{min-height:100svh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.5rem;gap:2rem}
.login-title{text-align:center}
.login-title h1{font-family:var(--fd);font-size:clamp(1.8rem,5vw,2.4rem);font-weight:700;letter-spacing:-.02em}
.login-title p{color:var(--muted);font-size:.9rem;margin-top:.4rem}
.pcards{display:flex;flex-direction:column;gap:.75rem;width:100%;max-width:310px}
.pcard{display:flex;align-items:center;gap:1rem;padding:1.1rem 1.3rem;background:var(--surface);border-radius:var(--r2);border:1px solid var(--border);cursor:pointer;transition:all var(--t);user-select:none}
.pcard:hover{box-shadow:var(--sh2);transform:translateY(-2px)}
.pcard:active{transform:scale(.98)}
.pcard.gi:hover{border-color:var(--gi-mid)}.pcard.br:hover{border-color:var(--br-mid)}.pcard.ca:hover{border-color:var(--ca-mid)}
.pav{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.25rem;flex-shrink:0}
.pcard.gi .pav{background:var(--gi-light)}.pcard.br .pav{background:var(--br-light)}.pcard.ca .pav{background:var(--ca-light)}
.pinfo strong{display:block;font-weight:600;font-size:.92rem}.pinfo span{font-size:.76rem;color:var(--muted)}
.parr{color:var(--muted2);font-size:1.1rem;margin-left:auto}

/* DASH */
#dash{display:none;min-height:100svh;background:var(--bg)}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:100;background:rgba(245,244,240,.94);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:.6rem 1.4rem;display:flex;align-items:center;gap:.7rem;flex-wrap:wrap}
.tbl{display:flex;align-items:center;gap:.65rem;flex:1;min-width:0}
.tbav{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.88rem;flex-shrink:0}
.gi-t .tbav{background:var(--gi-light)}.br-t .tbav{background:var(--br-light)}.ca-t .tbav{background:var(--ca-light)}
.tbnm{font-family:var(--fd);font-weight:700;font-size:.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tbsub{font-size:.68rem;color:var(--muted)}
.tbr{display:flex;align-items:center;gap:.45rem;flex-wrap:wrap}
.tbtn{padding:.35rem .8rem;border-radius:999px;font-size:.74rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-family:var(--fb);transition:all var(--t);white-space:nowrap}
.tbtn:hover{border-color:var(--border2);color:var(--text)}
.tbtn.pri{color:#fff;border:none}
.gi-t .tbtn.pri{background:var(--gi)}.br-t .tbtn.pri{background:var(--br)}.ca-t .tbtn.pri{background:var(--ca)}
.tbtn.pri:hover{filter:brightness(1.1)}

/* MAIN */
.main{padding:1.1rem 1.4rem 3rem;max-width:1300px;margin:0 auto}

/* HERO ROW */
.hero-row{display:grid;grid-template-columns:200px 1fr 1fr 1fr 1fr;gap:.75rem;margin-bottom:.8rem}
.hero-card{border-radius:var(--r2);padding:1.2rem 1.5rem;color:#fff;position:relative;overflow:hidden}
.gi-t .hero-card{background:linear-gradient(135deg,#880e4f,var(--gi))}
.br-t .hero-card{background:linear-gradient(135deg,#0d47a1,var(--br))}
.ca-t .hero-card{background:linear-gradient(135deg,#311b92,var(--ca))}
.hero-card::after{content:'';position:absolute;right:-20px;top:-20px;width:110px;height:110px;border-radius:50%;background:rgba(255,255,255,.08)}
.hlabel{font-size:.63rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.65);margin-bottom:.25rem}
.hvalue{font-family:var(--fd);font-size:1.75rem;font-weight:700;letter-spacing:-.03em;line-height:1}
.hdelta{font-size:.7rem;color:rgba(255,255,255,.6);margin-top:.3rem}
.stcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:.95rem 1.05rem;position:relative}
.stlabel{font-size:.63rem;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted2);margin-bottom:.28rem}
.stval{font-family:var(--fd);font-size:1.28rem;font-weight:700;letter-spacing:-.02em;line-height:1}
.stdelta{font-size:.68rem;font-weight:600;margin-top:.25rem}
.stico{position:absolute;top:.8rem;right:.9rem;font-size:.95rem;opacity:.28}
.up{color:var(--green)}.dn{color:var(--red)}

/* MAIN GRID */
.dgrid{display:grid;grid-template-columns:1fr 400px;gap:.8rem;align-items:start}

/* OVERVIEW */
.ovp{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.ovhdr{display:flex;align-items:center;justify-content:space-between;padding:.8rem 1.1rem;border-bottom:1px solid var(--border);background:var(--surface2);flex-wrap:wrap;gap:.5rem}
.ovhdr-l{display:flex;align-items:center;gap:.55rem}
.ovtitle{font-family:var(--fd);font-size:.95rem;font-weight:700}
.mnav{display:flex;align-items:center;gap:.15rem;background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:.18rem .22rem}
.mnavbtn{background:none;border:none;cursor:pointer;width:25px;height:25px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.82rem;color:var(--muted);transition:all var(--t)}
.mnavbtn:hover{background:var(--surface2);color:var(--text)}
.mlabel{font-size:.78rem;font-weight:600;min-width:78px;text-align:center}
.ovadds{display:flex;gap:.35rem}
.ovadd{padding:.28rem .7rem;border-radius:999px;font-size:.7rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-family:var(--fb);transition:all var(--t)}
.ovadd:hover{border-color:var(--border2);color:var(--text)}
.ovadd.gs:hover{border-color:var(--red-bd);color:var(--red)}
.ovadd.en:hover{border-color:var(--green-bd);color:var(--green)}

/* OV sections */
.ovsec{border-bottom:1px solid var(--border)}
.ovsec:last-child{border-bottom:none}
.ovsechdr{display:flex;align-items:center;justify-content:space-between;padding:.6rem 1.1rem .45rem;cursor:pointer;user-select:none;transition:background var(--t)}
.ovsechdr:hover{background:var(--surface2)}
.ovsec-l{display:flex;align-items:center;gap:.45rem}
.ovsec-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ovsec-dot.en{background:var(--green)}.ovsec-dot.gs{background:var(--red)}.ovsec-dot.rec{background:var(--amber)}
.ovsec-lbl{font-size:.7rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.ovsec-lbl.en{color:var(--green)}.ovsec-lbl.gs{color:var(--red)}.ovsec-lbl.rec{color:var(--amber)}
.ovsec-ct{font-size:.65rem;color:var(--muted2);background:var(--surface2);border:1px solid var(--border);border-radius:999px;padding:.08rem .42rem}
.ovsec-tog{font-size:.68rem;color:var(--muted2);transition:transform var(--t)}
.ovsec-tog.open{transform:rotate(180deg)}

/* OV items */
.ovitems{padding:0 1.1rem}
.ovitem{display:flex;align-items:center;gap:.55rem;padding:.48rem 0;border-bottom:1px solid var(--border)}
.ovitem:last-child{border-bottom:none}
.ovinfo{flex:1;min-width:0}
.ovdesc{font-size:.82rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ovmeta{font-size:.67rem;color:var(--muted2);margin-top:.07rem}
.ovval{font-size:.82rem;font-weight:700;flex-shrink:0;min-width:85px;text-align:right}
.ovacts{display:flex;gap:.08rem;flex-shrink:0}
.ovbtn{background:none;border:none;cursor:pointer;color:var(--muted2);font-size:.72rem;padding:.18rem .28rem;border-radius:5px;transition:all var(--t);line-height:1}
.ovbtn:hover{background:var(--surface2);color:var(--text)}
.ovbtn.del:hover{color:var(--red)}

/* OV inline edit */
.ovedit{padding:.45rem 0;border-bottom:1px solid var(--border)}
.ovedit:last-child{border-bottom:none}
.ovedit-r1{display:grid;grid-template-columns:88px 1fr 82px;gap:.35rem;margin-bottom:.3rem}
.ovedit-r2{display:grid;grid-template-columns:1fr auto;gap:.35rem;align-items:center}
.ovedit input,.ovedit select{padding:.32rem .5rem;border:1px solid var(--border);border-radius:var(--r);font-size:.77rem;font-family:var(--fb);color:var(--text);background:var(--surface);outline:none;transition:border-color var(--t);width:100%}
.ovedit input:focus,.ovedit select:focus{border-color:var(--ac)}
.gi-t .ovedit input:focus,.gi-t .ovedit select:focus{border-color:var(--gi)}
.br-t .ovedit input:focus,.br-t .ovedit select:focus{border-color:var(--br)}
.ovedit-btns{display:flex;gap:.3rem}
.oedsave{padding:.32rem .75rem;border:none;border-radius:var(--r);font-size:.73rem;font-weight:600;cursor:pointer;font-family:var(--fb);color:#fff;transition:all var(--t)}
.gi-t .oedsave{background:var(--gi)}.br-t .oedsave{background:var(--br)}.ca-t .oedsave{background:var(--ca)}
.oedcancel{padding:.32rem .65rem;border:1px solid var(--border);border-radius:var(--r);font-size:.73rem;font-weight:600;cursor:pointer;font-family:var(--fb);color:var(--muted);background:var(--surface)}

/* OV subtotal */
.ovsubtot{display:flex;align-items:center;justify-content:space-between;padding:.45rem 1.1rem .6rem;background:var(--surface2)}
.ovsubtot-l{font-size:.68rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.ovsubtot-v{font-family:var(--fd);font-size:1rem;font-weight:700}
.ovsubtot-v.en{color:var(--green)}.ovsubtot-v.gs{color:var(--red)}.ovsubtot-v.rec{color:var(--amber)}

/* RIGHT COL */
.rcol{display:flex;flex-direction:column;gap:.75rem}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:1.05rem 1.2rem}
.ptitle{font-size:.68rem;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:.8rem;display:flex;align-items:center;justify-content:space-between}
.ptitle a{font-size:.68rem;font-weight:500;text-transform:none;letter-spacing:0;cursor:pointer;text-decoration:none;color:var(--muted)}
.ptitle a:hover{text-decoration:underline}
.gi-t .ptitle a{color:var(--gi)}.br-t .ptitle a{color:var(--br)}.ca-t .ptitle a{color:var(--ca)}
.cw{position:relative;height:155px}

/* Reserva */
.resval{font-family:var(--fd);font-size:1.65rem;font-weight:700;margin-bottom:.12rem}
.resmeta{font-size:.74rem;color:var(--muted);margin-bottom:.55rem}
.ptr{height:7px;background:var(--bg);border-radius:999px;overflow:hidden;margin-bottom:.32rem}
.pf{height:100%;border-radius:999px;transition:width 1.3s cubic-bezier(.4,0,.2,1)}
.gi-t .pf{background:linear-gradient(90deg,var(--gi-mid),var(--gi))}
.br-t .pf{background:linear-gradient(90deg,var(--br-mid),var(--br))}
.ca-t .pf{background:linear-gradient(90deg,var(--ca-mid),var(--ca))}
.plabs{display:flex;justify-content:space-between;font-size:.67rem;color:var(--muted2)}
.resbtns{display:flex;gap:.38rem;margin-top:.75rem}
.resbtn{flex:1;padding:.38rem;border-radius:var(--r);font-size:.71rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-family:var(--fb);transition:all var(--t);text-align:center}
.resbtn:hover{border-color:var(--border2);color:var(--text)}

/* Recorrentes */
.recitem{display:flex;align-items:center;gap:.55rem;padding:.42rem 0;border-bottom:1px solid var(--border)}
.recitem:last-child{border-bottom:none}
.recpill{padding:.14rem .5rem;border-radius:999px;font-size:.6rem;font-weight:700;flex-shrink:0}
.recpill.fx{background:var(--red-bg);color:var(--red)}.recpill.en{background:var(--green-bg);color:var(--green)}
.recinfo{flex:1;min-width:0}
.recnm{font-size:.78rem;font-weight:500}.recsub{font-size:.67rem;color:var(--muted2);margin-top:.05rem}
.recval{font-size:.78rem;font-weight:600;color:var(--muted)}
.rectog{width:29px;height:16px;border-radius:999px;border:none;cursor:pointer;position:relative;transition:background var(--t);flex-shrink:0}
.rectog.on{background:var(--green)}.rectog.off{background:var(--muted2)}
.rectog::after{content:'';position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;background:#fff;transition:transform var(--t)}
.rectog.on::after{transform:translateX(13px)}

/* Insights */
.insrow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.48rem}
.inscard{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:.7rem .75rem;text-align:center}
.insico{font-size:.9rem;margin-bottom:.22rem}
.inslbl{font-size:.58rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted2);font-weight:600}
.insval{font-size:.76rem;font-weight:600;margin-top:.14rem}

/* Aportes */
.apitem{display:flex;justify-content:space-between;align-items:center;padding:.4rem 0;border-bottom:1px solid var(--border)}
.apitem:last-child{border-bottom:none}
.apmes{font-size:.75rem;color:var(--muted)}
.apval{font-size:.8rem;font-weight:600}
.gi-t .apval{color:var(--gi)}.br-t .apval{color:var(--br)}.ca-t .apval{color:var(--ca)}

/* Calc */
.calrow{display:grid;grid-template-columns:1fr 1fr;gap:.48rem;margin-bottom:.48rem}
.fg label{display:block;font-size:.63rem;font-weight:600;color:var(--muted);margin-bottom:.22rem;text-transform:uppercase;letter-spacing:.04em}
.fg input{width:100%;padding:.48rem .65rem;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:var(--fb);font-size:.86rem;outline:none;transition:border-color var(--t)}
.fg input:focus{border-color:var(--ac)}
.gi-t .fg input:focus{border-color:var(--gi)}.br-t .fg input:focus{border-color:var(--br)}.ca-t .fg input:focus{border-color:var(--ca)}
.calbtn{width:100%;padding:.52rem;border:none;border-radius:var(--r);font-family:var(--fb);font-weight:600;font-size:.82rem;cursor:pointer;margin-top:.32rem;transition:all var(--t);color:#fff}
.gi-t .calbtn{background:var(--gi)}.br-t .calbtn{background:var(--br)}.ca-t .calbtn{background:var(--ca)}
.calbtn:hover{filter:brightness(1.1)}
.calres{border-radius:var(--r);padding:.65rem;margin-top:.55rem;font-size:.77rem;line-height:1.6;display:none}
.calres.show{display:block}
.calres.pix{background:var(--green-bg);border:1px solid var(--green-bd);color:var(--green)}
.calres.parc{background:var(--br-light);border:1px solid var(--br-mid);color:var(--br)}
.calrec{font-weight:700;font-size:.82rem;margin-bottom:.13rem}

/* Casal */
.casalgrid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:.8rem}
.casalcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:1.05rem 1.2rem}
.casalhdr{display:flex;align-items:center;gap:.55rem;margin-bottom:.8rem;padding-bottom:.7rem;border-bottom:1px solid var(--border)}
.casalavt{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0}
.casalavt.gi{background:var(--gi-light)}.casalavt.br{background:var(--br-light)}
.casalnm{font-weight:600;font-size:.85rem}
.casalrow{display:flex;justify-content:space-between;align-items:center;padding:.32rem 0;border-bottom:1px solid var(--border);font-size:.79rem}
.casalrow:last-child{border-bottom:none}
.casalrow .lb{color:var(--muted)}.casalrow .vl{font-weight:700}
.casalrow .vl.pos{color:var(--green)}.casalrow .vl.neg{color:var(--red)}

/* MODAL */
.molay{display:none;position:fixed;inset:0;background:rgba(28,26,23,.42);backdrop-filter:blur(6px);z-index:500;align-items:center;justify-content:center;padding:1rem}
.molay.open{display:flex}
.modal{background:var(--surface);border-radius:var(--r3);padding:1.7rem;width:100%;max-width:410px;box-shadow:0 20px 60px rgba(0,0,0,.18);animation:mup .22s ease}
@keyframes mup{from{transform:translateY(16px);opacity:0}to{opacity:1;transform:none}}
.modal h3{font-family:var(--fd);font-size:1.1rem;font-weight:700;margin-bottom:1rem}
.mfg{margin-bottom:.72rem}
.mfg label{display:block;font-size:.68rem;font-weight:600;color:var(--muted);margin-bottom:.26rem;text-transform:uppercase;letter-spacing:.04em}
.mfg input,.mfg select{width:100%;padding:.62rem .82rem;border:1px solid var(--border);border-radius:var(--r);font-size:.92rem;font-family:var(--fb);color:var(--text);background:var(--surface);outline:none;transition:border-color var(--t);-webkit-appearance:none}
.mfg input:focus,.mfg select:focus{border-color:var(--ac)}
.gi-t .mfg input:focus,.gi-t .mfg select:focus{border-color:var(--gi)}
.br-t .mfg input:focus,.br-t .mfg select:focus{border-color:var(--br)}
.mrow{display:grid;grid-template-columns:1fr 1fr;gap:.6rem}
.macts{display:flex;gap:.6rem;margin-top:1rem}
.mbtn{flex:1;padding:.68rem;border-radius:var(--r);font-size:.86rem;font-weight:600;cursor:pointer;border:none;font-family:var(--fb);transition:all var(--t)}
.mbtn.cancel{background:var(--surface2);border:1px solid var(--border);color:var(--muted)}
.mbtn.cancel:hover{border-color:var(--border2)}
.mbtn.save{color:#fff}
.gi-t .mbtn.save{background:var(--gi)}.br-t .mbtn.save{background:var(--br)}.ca-t .mbtn.save{background:var(--ca)}

/* TOAST */
#toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(12px);opacity:0;pointer-events:none;background:var(--text);color:#fff;padding:.58rem 1.15rem;border-radius:999px;font-size:.8rem;font-weight:500;z-index:999;transition:all .25s ease;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{background:var(--green)}#toast.er{background:var(--red)}

.spin{width:18px;height:18px;border:2px solid var(--border);border-radius:50%;animation:spin .8s linear infinite;margin:3rem auto}
.gi-t .spin{border-top-color:var(--gi)}.br-t .spin{border-top-color:var(--br)}.ca-t .spin{border-top-color:var(--ca)}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:1080px){
  .hero-row{grid-template-columns:1fr 1fr 1fr}.hero-card{grid-column:1/-1}
  .dgrid{grid-template-columns:1fr}.casalgrid{grid-template-columns:1fr}
}
@media(max-width:640px){
  .main{padding:.8rem .8rem 2rem}.hero-row{grid-template-columns:1fr 1fr}
  .topbar{padding:.5rem .85rem;gap:.38rem}.mrow{grid-template-columns:1fr}
  .ovedit-r1{grid-template-columns:80px 1fr 75px}.calrow{grid-template-columns:1fr}
}
</style>
</head>
<body>
<script>const API_URL='https://script.google.com/macros/s/AKfycbzk-0kYMxTtW9ynnIRzQBgu6Cn5unEjoDCulLZbnT-aSQm0Sxg7wbuoUXc3qHCH0ZOl/exec';</script>

<!-- LOGIN -->
<div id="login">
  <div class="login-title"><h1>Financas do Casal</h1><p>Selecione seu perfil</p></div>
  <div class="pcards">
    <div class="pcard gi" onclick="selProfile('Giovanna Avoni','gi-t','Giovanna Avoni','💗')">
      <div class="pav">💗</div><div class="pinfo"><strong>Giovanna Avoni</strong><span>Painel individual</span></div><span class="parr">›</span>
    </div>
    <div class="pcard br" onclick="selProfile('Bruno Saldanha','br-t','Bruno Saldanha','💙')">

</div>

  <div class="mfg"><label>Pagamento</label><select id="rc-pg"><option>Pix</option><option>Débito automático</option><option>Cartão de Crédito</option><option>Boleto</option></select></div></div>

  <div class="mfg"><label>Tipo</label><select id="rv-tp"><option value="deposito">Depósito</option><option value="retirada">Retirada</option></select></div>
  <div class="mfg"><label>Observacao</label><input type="text" id="rv-ob"></div>

</div></div>

  <h3>⚙ Meta da Reserva</h3>
  <div class="mfg"><label>Novo valor da meta R$</label><input type="number" id="mt-vl" placeholder="Ex: 20000" inputmode="decimal"></div>
  <div class="macts"><button class="mbtn cancel" onclick="closeModal('mo-mt')">Cancelar</button><button class="mbtn save" onclick="savMt()">Salvar</button></div>
</div></div>

<div id="toast"></div>

<script>
var user,theme,dashData,dashGi,dashBr,charts={};
var ovDate=new Date(),editGs=false,editEn=false;
var ovOpen={en:true,rec:true,gs:true};
var MBR=['Janeiro','Fevereiro','Marco','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
var MSH=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
function isMes(d,m,y){var dt=new Date(d);return dt.getMonth()===m&&dt.getFullYear()===y;}

async function api(action,params){
  params=params||{};
  var res=await fetch(API_URL,{
    method:'POST',
    mode:'cors',
    body:JSON.stringify({action:action,params:params})
  });
  var json=await res.json();
  if(!json.ok)throw new Error(json.error||'Erro na API');
  return json.data;
}

function selProfile(u,th,nm,em){
  user=u;theme=th;
  document.getElementById('login').style.display='none';
  var d=document.getElementById('dash');
  d.style.display='block';d.className=th;
  document.getElementById('tb-av').textContent=em;
  document.getElementById('tb-nm').textContent=nm;
  ovDate=new Date();
  setTodayForms();
  var tbr=document.getElementById('tb-r');
  tbr.innerHTML=u==='casal'?'':'<button class="tbtn" onclick="openNewGs()">+ Gasto</button><button class="tbtn pri" onclick="openNewEn()">+ Entrada</button>';
  tbr.innerHTML+='<button class="tbtn" onclick="exportPDF()">⬇ PDF</button><button class="tbtn" onclick="voltarLogin()">← Sair</button>';
  document.getElementById('mc').innerHTML='<div class="spin"></div>';
  loadDash();
}

function voltarLogin(){
  document.getElementById('dash').style.display='none';
  document.getElementById('login').style.display='flex';
  user=null;dashData=null;dashGi=null;dashBr=null;
  Object.values(charts).forEach(function(c){if(c)c.destroy();});charts={};
}

async function loadDash(){
  try{
    if(user==='casal'){
      var results=await Promise.all([api('getDashboardData',{usuario:'Giovanna Avoni'}),api('getDashboardData',{usuario:'Bruno Saldanha'})]);
      dashGi=results[0];dashBr=results[1];
      renderCasal();
    }else{
      dashData=await api('getDashboardData',{usuario:user});
      renderIndividual();
    }
  }catch(e){
    toast('Erro: '+e.message,'er');
    document.getElementById('mc').innerHTML='<div style="text-align:center;padding:3rem;color:var(--red)">Erro ao carregar. Verifique a URL do Apps Script.</div>';
  }
}

function calcMes(data,mes,ano){
  var g=data.gastos||[],e=data.entradas||[];
  var gM=g.filter(function(r){return!r.virtual&&isMes(r.data,mes,ano);});
  var eM=e.filter(function(r){return!r.virtual&&isMes(r.data,mes,ano);});
  var gA=g.filter(function(r){var ma=mes===0?11:mes-1,ya=mes===0?ano-1:ano;return!r.virtual&&isMes(r.data,ma,ya);});
  var eA=e.filter(function(r){var ma=mes===0?11:mes-1,ya=mes===0?ano-1:ano;return!r.virtual&&isMes(r.data,ma,ya);});
  var aM=(data.aportes||[]).filter(function(r){return isMes(r.data,mes,ano);});
  var rv=(data.reserva||[]).reduce(function(s,r){return r.tipo==='deposito'?s+Number(r.valor):s-Number(r.valor);},0);
  return{gM:gM,eM:eM,gA:gA,eA:eA,aM:aM,
    totG:sum(gM),totE:sum(eM),totGa:sum(gA),totEa:sum(eA),totA:sum(aM),rv:rv,
    meta:Number(data.config&&data.config.meta_reserva||0)};
}

function renderIndividual(){
  var now=ovDate,mes=now.getMonth(),ano=now.getFullYear();
  var c=calcMes(dashData,mes,ano);
  var sob=c.totE-c.totG,sobA=c.totEa-c.totGa;
  var pct=c.meta?Math.min(100,(c.rv/c.meta*100)).toFixed(1):0;
  var evo=(dashData.summary&&dashData.summary.evolucao)||[];
  var recs=dashData.recorrentes||[];
  var aportes=dashData.aportes||[];
  var s=dashData.summary||{};

  document.getElementById('tb-sub').textContent=MBR[mes]+' de '+ano;

  var gd=pct100(c.totG,c.totGa),ed=pct100(c.totE,c.totEa);

  document.getElementById('mc').innerHTML=
    '<div class="hero-row" style="margin-bottom:.8rem">'+
      '<div class="hero-card"><div class="hlabel">Sobra do mes</div><div class="hvalue">'+fmt(sob)+'</div><div class="hdelta">'+(sob>=sobA?'↑':'↓')+' '+Math.abs(pct100(sob,sobA))+'% vs mes anterior</div></div>'+
      '<div class="stcard"><span class="stico">💰</span><div class="stlabel">Entradas</div><div class="stval">'+fmt(c.totE)+'</div><div class="stdelta '+(c.totE>=c.totEa?'up':'dn')+'">'+(c.totE>=c.totEa?'↑':'↓')+' '+Math.abs(ed)+'%</div></div>'+
      '<div class="stcard"><span class="stico">📤</span><div class="stlabel">Gastos</div><div class="stval">'+fmt(c.totG)+'</div><div class="stdelta '+(c.totG<=c.totGa?'up':'dn')+'">'+(c.totG<=c.totGa?'↓':'↑')+' '+Math.abs(gd)+'%</div></div>'+
      '<div class="stcard"><span class="stico">📈</span><div class="stlabel">Aporte</div><div class="stval">'+fmt(c.totA)+'</div></div>'+
      '<div class="stcard"><span class="stico">🏦</span><div class="stlabel">Reserva</div><div class="stval">'+fmt(c.rv)+'</div><div class="stdelta up">'+pct+'% da meta</div></div>'+
    '</div>'+
    '<div class="dgrid">'+
      '<div class="ovp" id="ovp">'+renderOvHTML()+'</div>'+
      '<div class="rcol">'+
        '<div class="panel"><div class="ptitle">Evolucao 6 meses</div><div class="cw"><canvas id="ch-evo"></canvas></div></div>'+
        '<div class="panel"><div class="ptitle">🏦 Reserva de Emergencia</div>'+
          '<div class="resval">'+fmt(c.rv)+'</div><div class="resmeta">Meta: '+fmt(c.meta)+'</div>'+
          '<div class="ptr"><div class="pf" id="pf" style="width:0%"></div></div>'+
          '<div class="plabs"><span>Progresso</span><span>'+pct+'%</span></div>'+
          '<div class="resbtns"><div class="resbtn" onclick="openModal(\'mo-rv\')">+ Movimentacao</div><div class="resbtn" onclick="openModal(\'mo-mt\')">⚙ Meta</div></div>'+
        '</div>'+
        '<div class="panel"><div class="ptitle">Recorrentes <a onclick="openModal(\'mo-rc\')">+ novo</a></div>'+
          (recs.length?recs.slice(0,6).map(function(r){return '<div class="recitem"><div class="recpill '+(r.tipo==='gasto'?'fx':'en')+'">'+(r.tipo==='gasto'?'Fixo':'Entrada')+'</div><div class="recinfo"><div class="recnm">'+r.descricao+'</div><div class="recsub">'+fmt(r.valor)+' · dia '+(r.dia_vencimento||'—')+'</div></div><button class="rectog '+(String(r.ativo)==='true'?'on':'off')+'" onclick="togRec(\''+r.id+'\','+(String(r.ativo)==='true')+')"></button></div>';}).join(''):'<div style="color:var(--muted2);font-size:.78rem">Nenhum recorrente</div>')+
        '</div>'+
        '<div class="panel"><div class="ptitle">Analise</div><div class="insrow">'+
          insCard('🏆','Top cat.',s.insights&&s.insights.catMaisUsada?s.insights.catMaisUsada[0]:'—')+
          insCard('📉','Mais gasto',s.insights&&s.insights.mesMaiorGasto?s.insights.mesMaiorGasto.label:'—')+
          insCard('💚','Maior sobra',s.insights&&s.insights.mesMaiorEcon?s.insights.mesMaiorEcon.label:'—')+
        '</div></div>'+
        '<div class="panel"><div class="ptitle">Aportes <a onclick="openModal(\'mo-ap\')">+ registrar</a></div>'+
          '<div class="cw" style="height:120px;margin-bottom:.6rem"><canvas id="ch-ap"></canvas></div>'+
          aportes.slice().reverse().slice(0,5).map(function(a){return '<div class="apitem"><span class="apmes">'+fmtDate(a.data)+(a.observacao?' · '+a.observacao:'')+'</span><span class="apval">'+fmt(a.valor)+'</span></div>';}).join('')+
        '</div>'+
        '<div class="panel"><div class="ptitle">💳 Pix vs Parcelado</div>'+
          '<div class="calrow"><div class="fg"><label>Valor a vista</label><input type="number" id="cv-v" placeholder="0,00" inputmode="decimal"></div>'+
          '<div class="fg"><label>Valor da parcela</label><input type="number" id="cv-p" placeholder="0,00" inputmode="decimal"></div></div>'+
          '<div class="calrow"><div class="fg"><label>N parcelas</label><input type="number" id="cv-n" placeholder="12" inputmode="numeric"></div>'+
          '<div class="fg"><label>Sua reserva</label><input type="number" id="cv-r" value="'+c.rv.toFixed(0)+'" inputmode="decimal"></div></div>'+
          '<button class="calbtn" onclick="calcular()">Calcular →</button>'+
          '<div class="calres" id="calres"></div>'+
        '</div>'+
      '</div>'+
    '</div>';

  setTimeout(function(){
    var pf=document.getElementById('pf');if(pf)pf.style.width=pct+'%';
    renderChEvo(evo);renderChAp(aportes);
  },100);
}

function renderOvHTML(){
  var mes=ovDate.getMonth(),ano=ovDate.getFullYear();
  var g=dashData&&dashData.gastos||[];
  var e=dashData&&dashData.entradas||[];
  var gM=g.filter(function(r){return!r.virtual&&isMes(r.data,mes,ano);});
  var eM=e.filter(function(r){return!r.virtual&&isMes(r.data,mes,ano);});
  var recM=g.filter(function(r){return r.virtual&&isMes(r.data,mes,ano);});
  var totE=sum(eM),totG=sum(gM),totRec=sum(recM);
  var lbl=MSH[mes]+' '+ano;

  return '<div class="ovhdr">'+
    '<div class="ovhdr-l">'+
      '<div class="ovtitle">Overview</div>'+
      '<div class="mnav">'+
        '<button class="mnavbtn" onclick="chgOvM(-1)">&#8249;</button>'+
        '<span class="mlabel">'+lbl+'</span>'+
        '<button class="mnavbtn" onclick="chgOvM(1)">&#8250;</button>'+
      '</div>'+
    '</div>'+
    '<div class="ovadds">'+
      '<button class="ovadd en" onclick="openNewEn()">+ Entrada</button>'+
      '<button class="ovadd gs" onclick="openNewGs()">+ Gasto</button>'+
    '</div>'+
  '</div>'+

  /* ENTRADAS */
  '<div class="ovsec">'+
    '<div class="ovsechdr" onclick="togOvSec(\'en\')">'+
      '<div class="ovsec-l"><div class="ovsec-dot en"></div><span class="ovsec-lbl en">Entradas</span><span class="ovsec-ct">'+eM.length+'</span></div>'+
      '<span class="ovsec-tog '+(ovOpen.en?'open':'')+'" id="otog-en">▾</span>'+
    '</div>'+
    '<div id="oen-items" style="display:'+(ovOpen.en?'block':'none')+'">'+
      '<div class="ovitems">'+(eM.length?eM.map(function(r){return ovRow(r,'en');}).join(''):'<div style="padding:.45rem 0;font-size:.78rem;color:var(--muted2)">Sem entradas</div>')+'</div>'+
      '<div class="ovsubtot"><span class="ovsubtot-l">Total entradas</span><span class="ovsubtot-v en">'+fmt(totE)+'</span></div>'+
    '</div>'+
  '</div>'+

  /* RECORRENTES */
  '<div class="ovsec">'+
    '<div class="ovsechdr" onclick="togOvSec(\'rec\')">'+
      '<div class="ovsec-l"><div class="ovsec-dot rec"></div><span class="ovsec-lbl rec">Saidas Recorrentes</span><span class="ovsec-ct">'+recM.length+'</span></div>'+
      '<span class="ovsec-tog '+(ovOpen.rec?'open':'')+'" id="otog-rec">▾</span>'+
    '</div>'+
    '<div id="orec-items" style="display:'+(ovOpen.rec?'block':'none')+'">'+
      '<div class="ovitems">'+(recM.length?recM.map(function(r){return '<div class="ovitem"><div class="ovinfo"><div class="ovdesc">'+r.descricao+'</div><div class="ovmeta">dia '+new Date(r.data).getDate()+(r.categoria?' · '+r.categoria:'')+' 🔁</div></div><div class="ovval" style="color:var(--amber)">- '+fmt(r.valor)+'</div><div class="ovacts"></div></div>';}).join(''):'<div style="padding:.45rem 0;font-size:.78rem;color:var(--muted2)">Sem recorrentes ativos</div>')+'</div>'+
      '<div class="ovsubtot"><span class="ovsubtot-l">Total recorrentes</span><span class="ovsubtot-v rec">'+fmt(totRec)+'</span></div>'+
    '</div>'+
  '</div>'+

  /* GASTOS DO MES */
  '<div class="ovsec">'+
    '<div class="ovsechdr" onclick="togOvSec(\'gs\')">'+
      '<div class="ovsec-l"><div class="ovsec-dot gs"></div><span class="ovsec-lbl gs">Saidas do Mes</span><span class="ovsec-ct">'+gM.length+'</span></div>'+
      '<span class="ovsec-tog '+(ovOpen.gs?'open':'')+'" id="otog-gs">▾</span>'+
    '</div>'+
    '<div id="ogs-items" style="display:'+(ovOpen.gs?'block':'none')+'">'+
      '<div class="ovitems">'+(gM.length?gM.map(function(r){return ovRow(r,'gs');}).join(''):'<div style="padding:.45rem 0;font-size:.78rem;color:var(--muted2)">Sem gastos</div>')+'</div>'+
      '<div class="ovsubtot"><span class="ovsubtot-l">Total saidas do mes</span><span class="ovsubtot-v gs">'+fmt(totG)+'</span></div>'+
    '</div>'+
  '</div>';
}

function ovRow(r,tipo){
  return '<div class="ovitem" id="ovr-'+r.id+'">'+
    '<div class="ovinfo"><div class="ovdesc">'+r.descricao+'</div><div class="ovmeta">'+fmtDate(r.data)+(r.categoria?' · '+r.categoria:'')+'</div></div>'+
    '<div class="ovval" style="color:'+(tipo==='en'?'var(--green)':'var(--red)')+'">'+(tipo==='en'?'+':'- ')+fmt(r.valor)+'</div>'+
    '<div class="ovacts"><button class="ovbtn" onclick="startEdit(\''+r.id+'\',\''+tipo+'\')">✏</button><button class="ovbtn del" onclick="delItem(\''+tipo+'\',\''+r.id+'\')">✕</button></div>'+
  '</div>';
}

function insCard(ic,lb,vl){return '<div class="inscard"><div class="insico">'+ic+'</div><div class="inslbl">'+lb+'</div><div class="insval">'+vl+'</div></div>';}

function chgOvM(dir){
  ovDate=new Date(ovDate.getFullYear(),ovDate.getMonth()+dir,1);
  var op=document.getElementById('ovp');
  if(op)op.innerHTML=renderOvHTML();
}

function togOvSec(sec){
  ovOpen[sec]=!ovOpen[sec];
  var el=document.getElementById('o'+sec+'-items');
  var tog=document.getElementById('otog-'+sec);
  if(el)el.style.display=ovOpen[sec]?'block':'none';
  if(tog){if(ovOpen[sec])tog.classList.add('open');else tog.classList.remove('open');}
}

function startEdit(id,tipo){
  var arr=tipo==='en'?dashData.entradas:dashData.gastos;
  var item=null;for(var i=0;i<arr.length;i++){if(arr[i].id===id){item=arr[i];break;}}
  if(!item)return;
  var row=document.getElementById('ovr-'+id);
  if(!row)return;
  var cats=tipo==='gs'?
    ['Alimentação','Transporte','Moradia','Saúde','Lazer','Educação','Vestuário','Assinaturas','Presentes','Outros']:
    ['Salário','Freelance','Investimento','Presente','Reembolso','Outros'];
  var catOpts=cats.map(function(c){return '<option'+(c===item.categoria?' selected':'')+'>'+c+'</option>';}).join('');
  row.outerHTML='<div class="ovedit" id="ovr-'+id+'">'+
    '<div class="ovedit-r1">'+
      '<input type="date" id="ie-dt-'+id+'" value="'+(item.data||'')+'">'+
      '<input type="text" id="ie-ds-'+id+'" value="'+(item.descricao||'')+'" placeholder="Descricao">'+
      '<input type="number" id="ie-vl-'+id+'" value="'+(item.valor||'')+'" placeholder="Valor">'+
    '</div>'+
    '<div class="ovedit-r2">'+
      '<select id="ie-ct-'+id+'">'+catOpts+'</select>'+
      '<div class="ovedit-btns">'+

function renderCasal(){
  var mes=ovDate.getMonth(),ano=ovDate.getFullYear();

  document.getElementById('mc').innerHTML=
    '<div class="hero-row" style="margin-bottom:.8rem">'+
      '<div class="hero-card"><div class="hlabel">Sobra total do casal</div><div class="hvalue">'+fmt(sob)+'</div><div class="hdelta">'+MBR[mes]+' de '+ano+'</div></div>'+
      '<div class="stcard"><span class="stico">💰</span><div class="stlabel">Entradas</div><div class="stval">'+fmt(totE)+'</div></div>'+
      '<div class="stcard"><span class="stico">📤</span><div class="stlabel">Gastos</div><div class="stval">'+fmt(totG)+'</div></div>'+
      '<div class="stcard"><span class="stico">📈</span><div class="stlabel">Aportes</div><div class="stval">'+fmt(totAp)+'</div></div>'+
      '<div class="stcard"><span class="stico">🏦</span><div class="stlabel">Reserva total</div><div class="stval">'+fmt(totRv)+'</div></div>'+
    '</div>'+
    '<div class="panel" style="margin-bottom:.8rem"><div class="ptitle">Evolucao conjunta — 6 meses</div><div class="cw" style="height:200px"><canvas id="ch-evo"></canvas></div></div>'+
    '<div class="casalgrid">'+casalCard('gi','💗','Giovanna Avoni',gi)+''+casalCard('br','💙','Bruno Saldanha',br)+'</div>'+
    '<div class="panel" style="margin-bottom:.8rem"><div class="ptitle">Comparativo individual</div><div class="cw" style="height:200px"><canvas id="ch-contrib"></canvas></div></div>'+
    '<div class="casalgrid">'+
      '<div class="panel"><div class="ptitle">🏦 Reserva — Giovanna</div><div class="resval">'+fmt(gi.rv)+'</div><div class="resmeta">Meta: '+fmt(gi.meta)+'</div><div class="ptr"><div class="pf" id="pf-gi" style="width:0%"></div></div><div class="plabs"><span>Progresso</span><span>'+(gi.meta?Math.min(100,(gi.rv/gi.meta*100)).toFixed(1):0)+'%</span></div></div>'+
      '<div class="panel"><div class="ptitle">🏦 Reserva — Bruno</div><div class="resval">'+fmt(br.rv)+'</div><div class="resmeta">Meta: '+fmt(br.meta)+'</div><div class="ptr"><div class="pf" id="pf-br" style="width:0%"></div></div><div class="plabs"><span>Progresso</span><span>'+(br.meta?Math.min(100,(br.rv/br.meta*100)).toFixed(1):0)+'%</span></div></div>'+
    '</div>';

  setTimeout(function(){
    var pgi=document.getElementById('pf-gi'),pbr=document.getElementById('pf-br');
    if(pgi&&gi.meta)pgi.style.width=Math.min(100,(gi.rv/gi.meta*100))+'%';
    if(pbr&&br.meta)pbr.style.width=Math.min(100,(br.rv/br.meta*100))+'%';
    renderChEvo(evo);renderChContrib(gi,br);

}

  ]},options:{responsive:true,maintainAspectRatio:false,

function renderChAp(aportes){

function renderChContrib(gi,br){

}

function calcular(){
  var vista=parseFloat(v('cv-v'))||0,parc=parseFloat(v('cv-p'))||0,num=parseInt(v('cv-n'))||1,res=parseFloat(v('cv-r'))||0;
  if(!vista||!parc||!num)return toast('Preencha os valores','er');
  var total=parc*num,extra=total-vista,rendim=vista*0.01*num,resOk=res>=vista*3;
  var rec,motivo,tipo;
  if(extra<=0){rec='PARCELADO';tipo='parc';motivo='Sem acrescimo — preserve seu caixa.';}
  else if(!resOk){rec='PARCELADO';tipo='parc';motivo='Reserva abaixo de 3x o valor. Preserve-a.';}
  else if(rendim>extra){rec='PARCELADO';tipo='parc';motivo='Rendimento est. ('+fmt(rendim)+') supera custo ('+fmt(extra)+')';}
  else{rec='PIX / A VISTA';tipo='pix';motivo='Economize '+fmt(extra)+' pagando a vista.';}
  var d=document.getElementById('calres');
  d.className='calres show '+tipo;
  d.innerHTML='<div class="calrec">✅ '+rec+'</div>'+motivo+'<div style="font-size:.7rem;opacity:.65;margin-top:.22rem">Total parcelado: '+fmt(total)+' · Custo extra: '+fmt(Math.max(0,extra))+'</div>';
}

function exportPDF(){
  if(!dashData&&user!=='casal'){toast('Carregue os dados primeiro','er');return;}
  var mes=ovDate.getMonth(),ano=ovDate.getFullYear();
  var nome=user==='casal'?'Casal':user;
  var cor=user==='Giovanna Avoni'?'#c2185b':user==='Bruno Saldanha'?'#1565c0':'#5e35b1';
  var periodo=MBR[mes]+' de '+ano;
  var body='';
  if(user!=='casal'&&dashData){
    var g=dashData.gastos||[],e=dashData.entradas||[];
    var gM=g.filter(function(r){return!r.virtual&&isMes(r.data,mes,ano);});
    var eM=e.filter(function(r){return!r.virtual&&isMes(r.data,mes,ano);});
    var totG=sum(gM),totE=sum(eM);
    var rv=(dashData.reserva||[]).reduce(function(s,r){return r.tipo==='deposito'?s+Number(r.valor):s-Number(r.valor);},0);
    var rows=eM.map(function(r){return Object.assign({},r,{_t:'entrada'});}).concat(gM.map(function(r){return Object.assign({},r,{_t:'gasto'});})).sort(function(a,b){return new Date(a.data)-new Date(b.data);});
    body='<div class="grid"><div class="card"><div class="l">Entradas</div><div class="v pos">'+fmt(totE)+'</div></div><div class="card"><div class="l">Gastos</div><div class="v neg">'+fmt(totG)+'</div></div><div class="card"><div class="l">Sobra</div><div class="v '+(totE-totG>=0?'pos':'neg')+'">'+fmt(totE-totG)+'</div></div><div class="card"><div class="l">Reserva</div><div class="v">'+fmt(rv)+'</div></div></div>'+
      '<div class="sec">Movimentacoes</div><table><thead><tr><th>Data</th><th>Descricao</th><th>Categoria</th><th>Tipo</th><th style="text-align:right">Valor</th></tr></thead><tbody>'+rows.map(function(r){return '<tr><td>'+fmtDate(r.data)+'</td><td>'+r.descricao+'</td><td>'+(r.categoria||'—')+'</td><td>'+r._t+'</td><td style="text-align:right;font-weight:700;color:'+(r._t==='gasto'?'#c62828':'#2e7d32')+'">'+(r._t==='gasto'?'-':'+')+' '+fmt(r.valor)+'</td></tr>';}).join('')+'</tbody></table>';
  }
  var html='<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Relatorio '+nome+'</title><style>body{font-family:Arial,sans-serif;color:#1c1a17;max-width:820px;margin:0 auto;padding:2rem;font-size:13px}h1{color:'+cor+';font-size:1.35rem;margin-bottom:.2rem}.sub{color:#7a7669;margin-bottom:1.3rem;font-size:.8rem}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.65rem;margin-bottom:1.2rem}.card{border:1px solid #e8e5df;border-radius:8px;padding:.65rem .85rem}.card .l{font-size:.6rem;text-transform:uppercase;letter-spacing:.06em;color:#b5b0a4;margin-bottom:.12rem}.card .v{font-size:1.05rem;font-weight:700}.pos{color:#2e7d32}.neg{color:#c62828}table{width:100%;border-collapse:collapse;margin-bottom:1.2rem}th{background:#f5f4f0;padding:.42rem .7rem;text-align:left;font-size:.65rem;text-transform:uppercase;color:#7a7669}td{padding:.42rem .7rem;border-bottom:1px solid #f5f4f0;font-size:.78rem}.sec{font-size:.82rem;font-weight:700;margin:1rem 0 .5rem}footer{margin-top:2rem;color:#b5b0a4;font-size:.65rem;text-align:center}@media print{body{padding:.5rem}}</style></head><body><h1>Relatorio — '+nome+'</h1><div class="sub">'+periodo+' · Gerado em '+new Date().toLocaleDateString('pt-BR')+'</div>'+body+'<footer>Financas do Casal · '+new Date().toLocaleString('pt-BR')+'</footer></body></html>';
  var w=window.open('','_blank');w.document.write(html);w.document.close();setTimeout(function(){w.print();},500);
}

function openModal(id){var e=document.getElementById(id);if(e)e.classList.add('open');}
function closeModal(id){var e=document.getElementById(id);if(e)e.classList.remove('open');}
function ovc(e,id){if(e.target===document.getElementById(id))closeModal(id);}
function resetGs(){editGs=false;document.getElementById('gs-id').value='';document.getElementById('gs-ti').textContent='💸 Novo Gasto';document.getElementById('gs-sv').textContent='Salvar';['gs-dt','gs-vl','gs-ds'].forEach(function(id){var e=document.getElementById(id);if(e)e.value='';});}
function resetEn(){editEn=false;document.getElementById('en-id').value='';document.getElementById('en-ti').textContent='💰 Nova Entrada';document.getElementById('en-sv').textContent='Salvar';['en-dt','en-vl','en-ds'].forEach(function(id){var e=document.getElementById(id);if(e)e.value='';});}
function setTodayForms(){var today=new Date().toISOString().split('T')[0];['gs-dt','en-dt','ap-dt','rv-dt'].forEach(function(id){var e=document.getElementById(id);if(e)e.value=today;});}

var v=function(id){return(document.getElementById(id)&&document.getElementById(id).value)||'';};
var sum=function(arr){return arr.reduce(function(s,r){return s+Number(r.valor);},0);};
var pct100=function(a,b){return b?((a-b)/Math.abs(b)*100).toFixed(1):0;};
var fmt=function(val){return 'R$ '+Number(val||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});};
var fmtK=function(val){return Math.abs(val)>=1000?'R$'+(val/1000).toFixed(1)+'k':'R$'+val;};
var fmtDate=function(d){if(!d)return'—';var dt=new Date(d);return isNaN(dt.getTime())?d:dt.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit'});};

function toast(msg,type){
  var t=document.getElementById('toast');
  t.textContent=msg;t.className='show'+(type?' '+type:'');
  clearTimeout(t._t);t._t=setTimeout(function(){t.className='';},3000);
}
