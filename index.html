<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Financas do Casal</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f0;--sur:#fff;--sur2:#faf9f7;
  --brd:#e8e5df;--brd2:#d4d0c8;
  --txt:#1c1a17;--mut:#7a7669;--mut2:#b5b0a4;
  --gi:#c2185b;--gi-l:#fce4ec;--gi-m:#f48fb1;
  --br:#1565c0;--br-l:#e3f2fd;--br-m:#90caf9;
  --ca:#5e35b1;--ca-l:#ede7f6;--ca-m:#b39ddb;
  --gn:#2e7d32;--gn-b:#f1f8e9;--gn-bd:#a5d6a7;
  --rd:#c62828;--rd-b:#ffebee;--rd-bd:#ef9a9a;
  --am:#e65100;--am-b:#fff3e0;--am-bd:#ffcc80;
  --yw:#f9a825;--yw-b:#fffde7;
  --r:10px;--r2:16px;--r3:22px;
  --sh:0 1px 4px rgba(0,0,0,.07),0 0 0 1px var(--brd);
  --sh2:0 4px 24px rgba(0,0,0,.1);
}
html{font-size:15px;background:var(--bg)}
body{font-family:system-ui,-apple-system,sans-serif;color:var(--txt);min-height:100vh}

/* LOGIN */
#login{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.5rem;gap:2rem}
.lt h1{font-size:2rem;font-weight:800;text-align:center;letter-spacing:-.03em}
.lt p{color:var(--mut);font-size:.9rem;margin-top:.4rem;text-align:center}
.pcards{display:flex;flex-direction:column;gap:.75rem;width:100%;max-width:320px}
.pcard{display:flex;align-items:center;gap:1rem;padding:1.1rem 1.3rem;background:var(--sur);border-radius:var(--r2);border:1px solid var(--brd);cursor:pointer;transition:all .18s}
.pcard:hover{box-shadow:var(--sh2);transform:translateY(-2px)}
.pcard.gi:hover{border-color:var(--gi-m)}.pcard.br:hover{border-color:var(--br-m)}.pcard.ca:hover{border-color:var(--ca-m)}
.pav{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
.pcard.gi .pav{background:var(--gi-l)}.pcard.br .pav{background:var(--br-l)}.pcard.ca .pav{background:var(--ca-l)}
.pinfo strong{display:block;font-weight:700;font-size:.95rem}.pinfo span{font-size:.78rem;color:var(--mut)}
.parr{color:var(--mut2);margin-left:auto}

/* DASH */
#dash{display:none;min-height:100vh;background:var(--bg)}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:100;background:rgba(245,244,240,.94);backdrop-filter:blur(16px);border-bottom:1px solid var(--brd);padding:.65rem 1.4rem;display:flex;align-items:center;gap:.7rem;flex-wrap:wrap}
.tbl{display:flex;align-items:center;gap:.7rem;flex:1}
.tbav{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.9rem}
.gi-t .tbav{background:var(--gi-l)}.br-t .tbav{background:var(--br-l)}.ca-t .tbav{background:var(--ca-l)}
.tbnm{font-weight:800;font-size:.9rem}.tbsub{font-size:.7rem;color:var(--mut)}
.tbr{display:flex;gap:.45rem;flex-wrap:wrap}
.tbtn{padding:.38rem .85rem;border-radius:999px;font-size:.76rem;font-weight:600;cursor:pointer;border:1px solid var(--brd);background:var(--sur);color:var(--mut);font-family:inherit;transition:all .18s}
.tbtn:hover{border-color:var(--brd2);color:var(--txt)}
.tbtn.pri{color:#fff;border:none}
.gi-t .tbtn.pri{background:var(--gi)}.br-t .tbtn.pri{background:var(--br)}.ca-t .tbtn.pri{background:var(--ca)}

/* MAIN LAYOUT */
.main{padding:1.1rem 1.4rem 3rem;max-width:1300px;margin:0 auto}

/* HERO ROW */
.hero-row{display:grid;grid-template-columns:200px 1fr 1fr 1fr 1fr;gap:.75rem;margin-bottom:.8rem}
.hcard{border-radius:var(--r2);padding:1.2rem 1.5rem;color:#fff;position:relative;overflow:hidden}
.gi-t .hcard{background:linear-gradient(135deg,#880e4f,var(--gi))}
.br-t .hcard{background:linear-gradient(135deg,#0d47a1,var(--br))}
.ca-t .hcard{background:linear-gradient(135deg,#311b92,var(--ca))}
.hlbl{font-size:.63rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.65);margin-bottom:.25rem}
.hval{font-size:1.75rem;font-weight:800;letter-spacing:-.03em;line-height:1}
.hdlt{font-size:.7rem;color:rgba(255,255,255,.6);margin-top:.3rem}
.stcard{background:var(--sur);border:1px solid var(--brd);border-radius:var(--r2);padding:.95rem 1.05rem;position:relative}
.stlbl{font-size:.63rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--mut2);margin-bottom:.28rem}
.stval{font-size:1.28rem;font-weight:800;letter-spacing:-.02em;line-height:1}
.stdlt{font-size:.68rem;font-weight:600;margin-top:.25rem}
.stico{position:absolute;top:.8rem;right:.9rem;font-size:.95rem;opacity:.3}
.up{color:var(--gn)}.dn{color:var(--rd)}

/* TOP GRID: overview + painel pago/pendente */


/* OVERVIEW */
.ovp{background:var(--sur);border:1px solid var(--brd);border-radius:var(--r2);overflow:hidden}
.ovhdr{display:flex;align-items:center;justify-content:space-between;padding:.8rem 1.1rem;border-bottom:1px solid var(--brd);background:var(--sur2);flex-wrap:wrap;gap:.5rem}
.ovtitle{font-size:.95rem;font-weight:800}
.mnav{display:flex;align-items:center;gap:.2rem;background:var(--sur);border:1px solid var(--brd);border-radius:999px;padding:.18rem .22rem}
.mnavbtn{background:none;border:none;cursor:pointer;width:25px;height:25px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.82rem;color:var(--mut)}
.mnavbtn:hover{background:var(--sur2);color:var(--txt)}
.mlabel{font-size:.78rem;font-weight:700;min-width:78px;text-align:center}
.ovadds{display:flex;gap:.35rem}
.ovadd{padding:.28rem .7rem;border-radius:999px;font-size:.7rem;font-weight:600;cursor:pointer;border:1px solid var(--brd);background:var(--sur);color:var(--mut);font-family:inherit;transition:all .18s}
.ovadd.en:hover{border-color:var(--gn-bd);color:var(--gn)}.ovadd.gs:hover{border-color:var(--rd-bd);color:var(--rd)}

/* OV sections */
.ovsec{border-bottom:1px solid var(--brd)}.ovsec:last-child{border-bottom:none}
.ovsechdr{display:flex;align-items:center;justify-content:space-between;padding:.55rem 1.1rem;cursor:pointer;transition:background .18s;user-select:none}
.ovsechdr:hover{background:var(--sur2)}
.ovsec-l{display:flex;align-items:center;gap:.45rem}
.ovsec-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ovsec-dot.en{background:var(--gn)}.ovsec-dot.gs{background:var(--rd)}.ovsec-dot.rec{background:var(--am)}
.ovsec-lbl{font-size:.7rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.ovsec-lbl.en{color:var(--gn)}.ovsec-lbl.gs{color:var(--rd)}.ovsec-lbl.rec{color:var(--am)}
.ovsec-ct{font-size:.65rem;color:var(--mut2);background:var(--sur2);border:1px solid var(--brd);border-radius:999px;padding:.08rem .42rem}
.ovsec-right{display:flex;align-items:center;gap:.6rem}
.ovsec-total{font-size:.82rem;font-weight:700;color:var(--mut)}
.ovsec-total.en{color:var(--gn)}.ovsec-total.gs{color:var(--rd)}.ovsec-total.rec{color:var(--am)}
.ovsec-tog{font-size:.68rem;color:var(--mut2);transition:transform .18s}
.ovsec-tog.open{transform:rotate(180deg)}

.ovitems{padding:0 1.1rem}
.ovitem{display:flex;align-items:center;gap:.5rem;padding:.45rem 0;border-bottom:1px solid var(--brd)}
.ovitem:last-child{border-bottom:none}

/* status pago */
.pay-toggle{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--brd2);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.65rem;transition:all .18s;background:var(--sur)}
.pay-toggle.paid{background:var(--gn);border-color:var(--gn);color:#fff}
.pay-toggle:hover{border-color:var(--gn)}

/* alerta vencimento */
.venc-badge{font-size:.6rem;font-weight:700;padding:.1rem .4rem;border-radius:4px;flex-shrink:0}
.venc-badge.warn{background:var(--yw-b);color:var(--yw);border:1px solid var(--yw)}
.venc-badge.near{background:var(--am-b);color:var(--am);border:1px solid var(--am-bd)}
.venc-badge.late{background:var(--rd-b);color:var(--rd);border:1px solid var(--rd-bd)}

.ovinfo{flex:1;min-width:0}
.ovdesc{font-size:.82rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ovdesc.paid-txt{text-decoration:line-through;opacity:.5}
.ovmeta{font-size:.67rem;color:var(--mut2);margin-top:.06rem}
.ovval{font-size:.82rem;font-weight:700;flex-shrink:0;min-width:80px;text-align:right}
.ovacts{display:flex;gap:.08rem;flex-shrink:0}
.ovbtn{background:none;border:none;cursor:pointer;color:var(--mut2);font-size:.72rem;padding:.18rem .28rem;border-radius:5px;transition:all .18s}
.ovbtn:hover{background:var(--sur2);color:var(--txt)}.ovbtn.del:hover{color:var(--rd)}

/* OV total geral */
.ov-total-row{display:flex;align-items:center;justify-content:space-between;padding:.6rem 1.1rem;background:var(--sur2);border-top:1px solid var(--brd)}
.ov-total-lbl{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--mut)}
.ov-total-val{font-size:1rem;font-weight:800;color:var(--rd)}

/* INLINE EDIT */
.ovedit{padding:.4rem 0;border-bottom:1px solid var(--brd)}.ovedit:last-child{border-bottom:none}
.ovedit-r1{display:grid;grid-template-columns:85px 1fr 78px;gap:.32rem;margin-bottom:.28rem}
.ovedit-r2{display:grid;grid-template-columns:1fr 1fr auto;gap:.32rem;align-items:center}
.ovedit input,.ovedit select{padding:.3rem .48rem;border:1px solid var(--brd);border-radius:var(--r);font-size:.77rem;font-family:inherit;color:var(--txt);background:var(--sur);outline:none;transition:border-color .18s;width:100%}
.gi-t .ovedit input:focus,.gi-t .ovedit select:focus{border-color:var(--gi)}
.br-t .ovedit input:focus,.br-t .ovedit select:focus{border-color:var(--br)}
.ovedit-btns{display:flex;gap:.28rem}
.oedsave{padding:.3rem .7rem;border:none;border-radius:var(--r);font-size:.73rem;font-weight:700;cursor:pointer;font-family:inherit;color:#fff}
.gi-t .oedsave{background:var(--gi)}.br-t .oedsave{background:var(--br)}.ca-t .oedsave{background:var(--ca)}
.oedcancel{padding:.3rem .6rem;border:1px solid var(--brd);border-radius:var(--r);font-size:.73rem;font-weight:600;cursor:pointer;font-family:inherit;color:var(--mut);background:var(--sur)}

/* PAINEL PAGO/PENDENTE */
.pay-panel{background:var(--sur);border:1px solid var(--brd);border-radius:var(--r2);padding:1.05rem 1.2rem}
.pp-title{font-size:.7rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--mut);margin-bottom:.9rem}
.pp-donut-wrap{display:flex;align-items:center;gap:1rem;margin-bottom:.9rem}
.pp-legend{flex:1;display:flex;flex-direction:column;gap:.5rem}
.pp-leg-item{display:flex;align-items:center;justify-content:space-between;gap:.5rem}
.pp-leg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.pp-leg-label{font-size:.78rem;color:var(--mut);flex:1}
.pp-leg-val{font-size:.82rem;font-weight:700}
.pp-stats{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}
.pp-stat{background:var(--sur2);border:1px solid var(--brd);border-radius:var(--r);padding:.6rem .75rem;text-align:center}
.pp-stat-lbl{font-size:.62rem;text-transform:uppercase;letter-spacing:.05em;color:var(--mut2);font-weight:700;margin-bottom:.2rem}
.pp-stat-val{font-size:.95rem;font-weight:800}

/* MIDDLE GRID */
.mid-grid{display:grid;grid-template-columns:260px 1fr;gap:.8rem;margin-bottom:.8rem;align-items:start}

/* ANALISE */
.analise-panel{background:var(--sur);border:1px solid var(--brd);border-radius:var(--r2);padding:1.05rem 1.2rem}
.ap-title{font-size:.7rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--mut);margin-bottom:.75rem}
.ap-cards{display:grid;grid-template-columns:repeat(5,1fr);gap:.5rem}
.ap-card{background:var(--sur2);border:1px solid var(--brd);border-radius:var(--r);padding:.6rem .7rem;text-align:center;display:flex;flex-direction:column;align-items:center;gap:.15rem}
.ap-card-ico{font-size:.95rem}
.ap-card-lbl{font-size:.58rem;text-transform:uppercase;letter-spacing:.04em;color:var(--mut2);font-weight:700;line-height:1.2}
.ap-card-val{font-size:.82rem;font-weight:700;line-height:1.2}
.ap-card-sub{font-size:.65rem;color:var(--mut);line-height:1.2}

/* RESERVA LADO */
.reserva-panel{background:var(--sur);border:1px solid var(--brd);border-radius:var(--r2);padding:1.05rem 1.2rem}
.rp-title{font-size:.7rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--mut);margin-bottom:.9rem;display:flex;align-items:center;justify-content:space-between}
.rp-title a{font-size:.68rem;font-weight:600;text-transform:none;letter-spacing:0;cursor:pointer;text-decoration:none;color:var(--mut)}
.gi-t .rp-title a{color:var(--gi)}.br-t .rp-title a{color:var(--br)}
.resval{font-size:1.65rem;font-weight:800;margin-bottom:.12rem}
.resmeta{font-size:.74rem;color:var(--mut);margin-bottom:.55rem}
.ptr{height:7px;background:var(--bg);border-radius:999px;overflow:hidden;margin-bottom:.32rem}
.pf{height:100%;border-radius:999px;transition:width 1.3s ease}
.gi-t .pf{background:linear-gradient(90deg,var(--gi-m),var(--gi))}
.br-t .pf{background:linear-gradient(90deg,var(--br-m),var(--br))}
.ca-t .pf{background:linear-gradient(90deg,var(--ca-m),var(--ca))}
.plabs{display:flex;justify-content:space-between;font-size:.67rem;color:var(--mut2);margin-bottom:.7rem}
/* histórico reserva */
.rv-hist{margin-top:.7rem;border-top:1px solid var(--brd);padding-top:.7rem}
.rv-hist-title{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--mut2);margin-bottom:.5rem}
.rv-hist-item{display:flex;align-items:center;justify-content:space-between;padding:.3rem 0;border-bottom:1px solid var(--brd);font-size:.75rem}
.rv-hist-item:last-child{border-bottom:none}
.rv-hist-item .rhi-date{color:var(--mut)}
.rv-hist-item .rhi-val{font-weight:700}
.rv-hist-item .rhi-val.dep{color:var(--gn)}.rv-hist-item .rhi-val.ret{color:var(--rd)}
/* histórico metas */
.meta-hist{margin-top:.6rem}
.meta-hist-item{font-size:.72rem;color:var(--mut);padding:.2rem 0}
.meta-hist-item .mhi-val{font-weight:700;color:var(--txt)}
.meta-hist-item .mhi-done{color:var(--gn)}

/* BOTTOM GRID */
.bot-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.8rem;margin-bottom:.8rem}

/* RECORRENTES PAINEL */
.rec-panel{background:var(--sur);border:1px solid var(--brd);border-radius:var(--r2);padding:1.05rem 1.2rem}
.rec-panel-title{font-size:.7rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--mut);margin-bottom:.8rem;display:flex;align-items:center;justify-content:space-between}
.rec-panel-title a{font-size:.68rem;font-weight:600;text-transform:none;letter-spacing:0;cursor:pointer;text-decoration:none}
.gi-t .rec-panel-title a{color:var(--gi)}.br-t .rec-panel-title a{color:var(--br)}
.recitem{display:flex;align-items:center;gap:.5rem;padding:.42rem 0;border-bottom:1px solid var(--brd)}.recitem:last-child{border-bottom:none}
.recpill{padding:.14rem .5rem;border-radius:999px;font-size:.6rem;font-weight:700;flex-shrink:0}
.recpill.fx{background:var(--rd-b);color:var(--rd)}.recpill.en{background:var(--gn-b);color:var(--gn)}
.recinfo{flex:1;min-width:0}
.recnm{font-size:.78rem;font-weight:600}.recsub{font-size:.67rem;color:var(--mut2);margin-top:.04rem}
.recval{font-size:.78rem;font-weight:700;color:var(--mut);flex-shrink:0}
.rectog{width:29px;height:16px;border-radius:999px;border:none;cursor:pointer;position:relative;transition:background .18s;flex-shrink:0}
.rectog.on{background:var(--gn)}.rectog.off{background:var(--mut2)}
.rectog::after{content:'';position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;background:#fff;transition:transform .18s}
.rectog.on::after{transform:translateX(13px)}
.recbtnrow{display:flex;gap:.25rem;flex-shrink:0}
.recact{background:none;border:none;cursor:pointer;color:var(--mut2);font-size:.72rem;padding:.18rem .28rem;border-radius:5px;transition:all .18s}
.recact:hover{background:var(--sur2);color:var(--txt)}.recact.del:hover{color:var(--rd)}

/* INVESTIMENTOS */
.inv-panel{background:var(--sur);border:1px solid var(--brd);border-radius:var(--r2);padding:1.05rem 1.2rem}
.inv-title{font-size:.7rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--mut);margin-bottom:.8rem;display:flex;align-items:center;justify-content:space-between}
.inv-title a{font-size:.68rem;font-weight:600;text-transform:none;letter-spacing:0;cursor:pointer;text-decoration:none}
.gi-t .inv-title a{color:var(--gi)}.br-t .inv-title a{color:var(--br)}
.inv-chart-wrap{position:relative;height:140px;margin-bottom:.7rem}
.inv-item{display:flex;align-items:center;gap:.5rem;padding:.38rem 0;border-bottom:1px solid var(--brd)}.inv-item:last-child{border-bottom:none}
.inv-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.inv-info{flex:1;min-width:0}
.inv-nm{font-size:.78rem;font-weight:600}.inv-sub{font-size:.66rem;color:var(--mut2);margin-top:.04rem}
.inv-val{font-size:.78rem;font-weight:700;flex-shrink:0}
.inv-pct{font-size:.65rem;color:var(--mut2);flex-shrink:0;min-width:32px;text-align:right}
.invact{background:none;border:none;cursor:pointer;color:var(--mut2);font-size:.7rem;padding:.15rem .25rem;border-radius:5px;transition:all .18s}
.invact:hover{background:var(--sur2);color:var(--txt)}.invact.del:hover{color:var(--rd)}

/* EVOLUÇÃO + CALC */
.evo-calc-grid{display:grid;grid-template-columns:1.6fr 1fr;gap:.8rem;margin-bottom:.8rem}
.panel{background:var(--sur);border:1px solid var(--brd);border-radius:var(--r2);padding:1.05rem 1.2rem}
.ptitle{font-size:.7rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--mut);margin-bottom:.8rem;display:flex;align-items:center;justify-content:space-between}
.ptitle a{font-size:.68rem;font-weight:600;text-transform:none;letter-spacing:0;cursor:pointer;text-decoration:none;color:var(--mut)}
.gi-t .ptitle a{color:var(--gi)}.br-t .ptitle a{color:var(--br)}
.cw{position:relative;height:155px}
.calrow{display:grid;grid-template-columns:1fr 1fr;gap:.48rem;margin-bottom:.48rem}
.fg label{display:block;font-size:.63rem;font-weight:700;color:var(--mut);margin-bottom:.22rem;text-transform:uppercase;letter-spacing:.04em}
.fg input{width:100%;padding:.48rem .65rem;background:var(--sur2);border:1px solid var(--brd);border-radius:var(--r);color:var(--txt);font-family:inherit;font-size:.86rem;outline:none;transition:border-color .18s}
.gi-t .fg input:focus{border-color:var(--gi)}.br-t .fg input:focus{border-color:var(--br)}
.calbtn{width:100%;padding:.52rem;border:none;border-radius:var(--r);font-family:inherit;font-weight:700;font-size:.82rem;cursor:pointer;margin-top:.32rem;color:#fff}
.gi-t .calbtn{background:var(--gi)}.br-t .calbtn{background:var(--br)}.ca-t .calbtn{background:var(--ca)}
.calres{border-radius:var(--r);padding:.65rem;margin-top:.55rem;font-size:.77rem;line-height:1.6;display:none}
.calres.show{display:block}
.calres.pix{background:var(--gn-b);border:1px solid var(--gn-bd);color:var(--gn)}
.calres.parc{background:var(--br-l);border:1px solid var(--br-m);color:var(--br)}
.calrec{font-weight:800;font-size:.82rem;margin-bottom:.13rem}

/* CASAL */
.casalgrid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:.8rem}
.casalcard{background:var(--sur);border:1px solid var(--brd);border-radius:var(--r2);padding:1.05rem 1.2rem}
.casalhdr{display:flex;align-items:center;gap:.55rem;margin-bottom:.8rem;padding-bottom:.7rem;border-bottom:1px solid var(--brd)}
.casalavt{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem}
.casalavt.gi{background:var(--gi-l)}.casalavt.br{background:var(--br-l)}
.casalnm{font-weight:700;font-size:.85rem}

// ── API
async function api(action,params){
  params=params||{};
  if(true){
    try{
      var res=await fetch(API_URL,{method:'POST',mode:'cors',body:JSON.stringify({action:action,params:params})});
      if(res.ok){var json=await res.json();if(json.ok)return json.data;}

  }
  if(action==='getDashboardData') return JSON.parse(JSON.stringify(params.usuario==='Bruno Saldanha'?MOCK_BR:MOCK_GI));
  return {ok:true,id:'mock_'+Date.now()};
}

function isMes(d,m,y){var dt=new Date(d);return dt.getMonth()===m&&dt.getFullYear()===y;}
function sum(arr){return arr.reduce(function(s,r){return s+Number(r.valor);},0);}
function pct100(a,b){return b?((a-b)/Math.abs(b)*100).toFixed(1):0;}
function fmt(v){return 'R$ '+Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtK(v){return Math.abs(v)>=1000?'R$'+(v/1000).toFixed(1)+'k':'R$'+Number(v).toFixed(0);}
function fmtDate(d){if(!d)return'—';var dt=new Date(d);return isNaN(dt.getTime())?d:dt.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit'});}
function V(id){return(document.getElementById(id)&&document.getElementById(id).value)||'';}
function rgb(){return user==='Giovanna Avoni'?'194,24,91':user==='Bruno Saldanha'?'21,101,192':'94,53,177';}

function vencBadge(dia){
  if(!dia)return'';
  var today=new Date(),d=new Date(ovDate.getFullYear(),ovDate.getMonth(),Number(dia));
  var diff=Math.floor((d-today)/(1000*60*60*24));
  if(diff<0)return'<span class=\\"venc-badge late\\">Atrasado</span>';
  if(diff===0)return'<span class=\\"venc-badge near\\">Hoje</span>';
  if(diff<=3)return'<span class=\\"venc-badge warn\\">'+diff+'d</span>';
  return'';
}

function calcMes(data,mes,ano){
  var mesA=mes===0?11:mes-1,anoA=mes===0?ano-1:ano;
  var g=data.gastos||[],e=data.entradas||[],ap=data.aportes||[],rv=data.reserva||[];
  // Saidas: gastos manuais + recorrentes ativos (todos, independente da data)
  var gM=g.filter(function(r){return!r.virtual&&isMes(r.data,mes,ano);});
  var recM=g.filter(function(r){return r.virtual&&isMes(r.data,mes,ano);});
  var eM=e.filter(function(r){return!r.virtual&&isMes(r.data,mes,ano);});
  var gA=g.filter(function(r){return!r.virtual&&isMes(r.data,mesA,anoA);});
  var eA=e.filter(function(r){return!r.virtual&&isMes(r.data,mesA,anoA);});
  var aM=ap.filter(function(r){return isMes(r.data,mes,ano);});
  var rvVal=rv.reduce(function(s,r){return r.tipo==='deposito'?s+Number(r.valor):s-Number(r.valor);},0);
  var totG=sum(gM),totRec=sum(recM),totE=sum(eM);
  // Sobra = entradas - (saidas manuais + recorrentes)
  return{gM:gM,recM:recM,eM:eM,gA:gA,eA:eA,aM:aM,
    totG:totG,totRec:totRec,totSaidas:totG+totRec,totE:totE,
    totGa:sum(gA),totEa:sum(eA),totA:sum(aM),rv:rvVal,
    meta:Number(data.config&&data.config.meta_reserva||0)};
}

function ovSec(tipo,titulo,items,total){
  var isOpen=ovOpen[tipo]!==false;
  var itemsHtml=items.length?items.map(function(r){return ovRow(r,tipo);}).join(''):'<div style="padding:.4rem 0;font-size:.78rem;color:var(--mut2)">Sem registros</div>';
  return '<div class="ovsec">'+
    '<div class="ovsechdr" data-sec="'+tipo+'" onclick="togOvSec(this.dataset.sec)">'+
      '<div class="ovsec-l"><div class="ovsec-dot '+tipo+'"></div><span class="ovsec-lbl '+tipo+'">'+titulo+'</span><span class="ovsec-ct">'+items.length+'</span></div>'+
      '<div class="ovsec-right"><span class="ovsec-total '+tipo+'">'+fmt(total)+'</span><span class="ovsec-tog '+(isOpen?'open':'')+'" id="otog-'+tipo+'">▾</span></div>'+
    '</div>'+
    '<div id="ov-'+tipo+'-items" style="display:'+(isOpen?'block':'none')+'"><div class="ovitems">'+itemsHtml+'</div></div>'+
  '</div>';
}

function ovRow(r,tipo){
  var isRec=tipo==='rec';
  var paid=!!paidStatus[r.id];
  var badge='';
  if(tipo!=='en'&&!isRec&&r.vencimento){
    var today=new Date(),dv=new Date(ovDate.getFullYear(),ovDate.getMonth(),Number(r.vencimento));
    var diff=Math.floor((dv-today)/(1000*60*60*24));
    if(diff<0)badge='<span class="venc-badge late">Atrasado</span>';
    else if(diff===0)badge='<span class="venc-badge near">Hoje</span>';
    else if(diff<=3)badge='<span class="venc-badge warn">'+diff+'d</span>';
  }
  if(isRec&&r.vencimento){
    var t2=new Date(),dv2=new Date(ovDate.getFullYear(),ovDate.getMonth(),Number(r.vencimento));
    if(Math.floor((dv2-t2)/(1000*60*60*24))>=0&&Math.floor((dv2-t2)/(1000*60*60*24))<=3)badge='<span class="venc-badge warn">'+Math.floor((dv2-t2)/(1000*60*60*24))+'d</span>';
  }
  var valColor=tipo==='en'?'var(--gn)':isRec?'var(--am)':'var(--rd)';
  var payToggle=tipo!=='en'?'<div class="pay-toggle'+(paid?' paid':'')+'" data-id="'+r.id+'" onclick="togglePaid(this.dataset.id)">'+(paid?'✓':'')+'</div>':'';
  var editBtn=!isRec?'<button class="ovbtn" data-id="'+r.id+'" data-tipo="'+tipo+'" onclick="openEditItem(this.dataset.id,this.dataset.tipo)">✏</button>':'<button class="ovbtn" data-id="'+r.id+'" onclick="openEditRcById(this.dataset.id)">✏</button>';
  var delBtn='<button class="ovbtn del" data-tipo="'+tipo+'" data-id="'+r.id+'" onclick="delItemDirect(this.dataset.tipo,this.dataset.id)">🗑</button>';
  return '<div class="ovitem" id="ovr-'+r.id+'">'+payToggle+badge+
    '<div class="ovinfo"><div class="ovdesc'+(paid?' paid-txt':'')+'">'+( r.descricao||'')+'</div><div class="ovmeta">'+fmtDate(r.data)+(r.categoria?' · '+r.categoria:'')+(r.forma_pagamento?' · '+r.forma_pagamento:'')+(r.vencimento&&tipo!=='en'?' · venc. dia '+r.vencimento:'')+'</div></div>'+
    '<div class="ovval" style="color:'+valColor+'">'+(tipo==='en'?'+':'-')+fmt(r.valor)+'</div>'+
    '<div class="ovacts">'+editBtn+delBtn+'</div></div>';
}

function reRenderOv(){
  var c=dashData?calcMes(dashData,ovDate.getMonth(),ovDate.getFullYear()):null;
  var op=document.getElementById('ovp');
  if(op)op.innerHTML=renderOvHTML(c);
  // atualiza painel pago/pendente
  if(c){
    var allSaidas=(c.gM||[]).concat(c.recM||[]);
    var paidVal=allSaidas.filter(function(r){return paidStatus[r.id];}).reduce(function(s,r){return s+Number(r.valor);},0);
    var pendVal=c.totSaidas-paidVal;

    var paidCount=allSaidas.filter(function(r){return paidStatus[r.id];}).length;

    // atualiza cards inline
    var allCards=document.querySelectorAll('.stcard');
    // simples: não re-renderiza tudo, só o donut
  }
}

function togOvSec(sec){
  ovOpen[sec]=!ovOpen[sec];
  var el=document.getElementById('ov-'+sec+'-items');
  var tog=document.getElementById('otog-'+sec);
  if(el)el.style.display=ovOpen[sec]?'block':'none';
  if(tog){if(ovOpen[sec])tog.classList.add('open');else tog.classList.remove('open');}
}

function chgOvM(dir){
  ovDate=new Date(ovDate.getFullYear(),ovDate.getMonth()+dir,1);
  loadPaid();reRenderOv();
}

// ── EDIT ITEM INLINE NO OV
function openEditItem(id,tipo){
  var arr=tipo==='en'?dashData.entradas:dashData.gastos;
  var item=null;for(var i=0;i<arr.length;i++){if(arr[i].id===id){item=arr[i];break;}}
  if(!item)return;
  if(tipo==='en'){
    openEditEnModal(item);
  }else{
    openEditGsModal(item);
  }
}

function delItemDirect(tipo,id){

    // é virtual — encontra o recorrente correspondente
    toast('Para excluir recorrentes, use o painel de Recorrentes');return;
  }

    '</div>'+
    '<div class="panel" style="margin-bottom:.8rem"><div class="ptitle">Evolucao conjunta</div><div class="cw" style="height:200px"><canvas id="ch-evo"></canvas></div></div>'+
    '<div class="casalgrid">'+casalCard('gi','💗','Giovanna Avoni',gi)+''+casalCard('br','💙','Bruno Saldanha',br)+'</div>'+
    '<div class="panel" style="margin-bottom:.8rem"><div class="ptitle">Comparativo individual</div><div class="cw" style="height:200px"><canvas id="ch-contrib"></canvas></div></div>'+

      '<div class="panel"><div class="ptitle">Reserva — Bruno</div><div class="resval">'+fmt(br.rv)+'</div><div class="resmeta">Meta: '+fmt(br.meta)+'</div><div class="ptr"><div class="pf" id="pf-br" style="width:0%"></div></div><div class="plabs"><span>Progresso</span><span>'+(br.meta?Math.min(100,(br.rv/br.meta*100)).toFixed(1):0)+'%</span></div></div>'+
    '</div>';

  setTimeout(function(){
    var pgi=document.getElementById('pf-gi'),pbr=document.getElementById('pf-br');

// ── CALCULADORA
function calcular(){
  var vista=parseFloat(V('cv-v'))||0,parc=parseFloat(V('cv-p'))||0,num=parseInt(V('cv-n'))||1,res=parseFloat(V('cv-r'))||0;
  if(!vista||!parc||!num)return toast('Preencha os valores','er');
  var total=parc*num,extra=total-vista,rendim=vista*0.01*num,resOk=res>=vista*3;
  var rec,motivo,tipo;
  if(extra<=0){rec='PARCELADO';tipo='parc';motivo='Sem acrescimo — preserve seu caixa.';}
  else if(!resOk){rec='PARCELADO';tipo='parc';motivo='Reserva abaixo de 3x o valor.';}
  else if(rendim>extra){rec='PARCELADO';tipo='parc';motivo='Rendimento da reserva supera custo do parcelamento.';}
  else{rec='PIX / A VISTA';tipo='pix';motivo='Economize '+fmt(extra)+' pagando a vista.';}
  var d=document.getElementById('calres');
  d.className='calres show '+tipo;
  d.innerHTML='<div class="calrec">✅ '+rec+'</div>'+motivo+'<div style="font-size:.7rem;opacity:.65;margin-top:.22rem">Total parcelado: '+fmt(total)+' · Custo extra: '+fmt(Math.max(0,extra))+'</div>';
}

async function delMeta(mi){
  if(!confirm('Excluir esta meta?'))return;
  var metas=dashData.metaHistorico||[];
  metas.splice(mi,1);
  dashData.metaHistorico=metas;
  toast('Meta removida!');
  renderInd();
}
function editRv(id){
  var rv=dashData.reserva||[];
  var item=null;for(var i=0;i<rv.length;i++){if(rv[i].id===id){item=rv[i];break;}}
  if(!item)return;
  document.getElementById('rv-dt').value=item.data||'';
  document.getElementById('rv-vl').value=item.valor||'';
  document.getElementById('rv-ob').value=item.observacao||'';
  document.getElementById('rv-vl').dataset.rid=id;
  if(item.tipo==='deposito')document.getElementById('rv-tp').value='deposito';
  else document.getElementById('rv-tp').value='retirada';
  openModal('mo-rv');
}
async function delRv(id){
  if(!confirm('Excluir esta movimentacao?'))return;
  await api('deleteRow',{sheetName:'reserva_emergencia',id:id});
  dashData.reserva=(dashData.reserva||[]).filter(function(r){return r.id!==id;});
  toast('Movimentacao removida!');
  renderInd();
}

function toast(msg,type){
  var t=document.getElementById('toast');
  t.textContent=msg;t.className='show'+(type?' '+type:'');
  clearTimeout(t._t);t._t=setTimeout(function(){t.className='';},3000);
}
</script>
